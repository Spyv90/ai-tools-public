<!DOCTYPE html>
<html>

<body style="text-align:center;margin-top:100px;font-family:sans-serif">

<h2>Login Member</h2>

<input id="email" placeholder="Masukkan email member">

<br><br>

<button onclick="start()">Masuk Tools</button>

<script>

function start(){

var email = document.getElementById("email").value

if(email==""){
alert("Masukkan email dulu")
return
}

var url = "https://script.google.com/macros/s/AKfycbzZQYCYoIC8A0ZGPX0pRUl3BS2noMNB9kKwwATFc51LQxWb8N6dxsLvwqZau7b_eNG4/exec?email="
+ encodeURIComponent(email)
+ "&device="
+ encodeURIComponent(navigator.userAgent)

fetch(url)
.then(res => res.text())
.then(data => {

if(data.trim()=="OK"){

// kirim log login ke sheet
var img = new Image()
img.src = url

// redirect ke tools
setTimeout(function(){
window.location.href="https://gemini.google.com/share/790d018c6dff"
},500)

}else{

alert("Email tidak terdaftar")

}

})
.catch(err => {

alert("Server error")

})

}

</script>

</body>
</html>
