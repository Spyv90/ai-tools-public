<!DOCTYPE html>
<html>

<body style="text-align:center;margin-top:100px;font-family:sans-serif">

<h2>Login Member</h2>

<input id="email" placeholder="Masukkan email">

<br><br>

<button onclick="login()">Masuk Tools</button>

<script>

function login(){

var email=document.getElementById("email").value

if(email==""){
alert("Masukkan email")
return
}

var device=navigator.userAgent

fetch("https://script.google.com/macros/s/AKfycbzZQYCYoIC8A0ZGPX0pRUl3BS2noMNB9kKwwATFc51LQxWb8N6dxsLvwqZau7b_eNG4/exec?action=login&email="
+encodeURIComponent(email)
+"&device="
+encodeURIComponent(device))

.then(res=>res.text())

.then(token=>{

if(token=="NO"){

alert("Email tidak terdaftar")

}else{

window.location.href="app.html?token="+token

}

})

}

</script>

</body>
</html>
