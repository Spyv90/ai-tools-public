<!DOCTYPE html>
<html>

<body style="text-align:center;margin-top:100px;font-family:sans-serif">

<h2>Login Member</h2>

<input id="email" placeholder="Masukkan email member">

<br><br>

<button onclick="start()">Masuk Tools</button>

<script>

function start(){

var email = document.getElementById("email").value

if(email==""){
alert("Masukkan email dulu")
return
}

fetch("https://script.google.com/macros/s/AKfycbyMw-mdBfTH8-QT32fnCUpTZVX2-3LjFkQm-KaiaIuwj44ePryXyq4znPvgTdqZ49H_/exec?email="+encodeURIComponent(email))

.then(res => res.text())

.then(data => {

if(data.trim()=="OK"){

window.location.href="https://gemini.google.com/share/790d018c6dff"

}else{

alert("Email tidak terdaftar")

}

})

.catch(err => {
alert("Server error")
})

}

</script>

</body>
</html>
